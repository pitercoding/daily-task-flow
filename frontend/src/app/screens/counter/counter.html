<div class="counter">
  <app-title mainTitle="Manual Counter" subTitle="A simple counter to manually track increments, decrements, and resets in your Daily Task Flow."></app-title>
  <div class="counter__content">
    <span>{{ count() }}</span>
    <div class="counter__buttons">
      <button (click)="increment()" class="btn btn-primary">
        Increment
      </button>
      <button (click)="decrement()" class="btn btn-secondary">
        Decrement
      </button>
      <button (click)="reset()" class="btn btn-danger">
        Reset
      </button>
    </div>
  </div>
</div>
